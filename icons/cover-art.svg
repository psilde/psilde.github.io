<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c100a"/>
      <stop offset="100%" stop-color="#070908"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- vinyl outer edge -->
  <circle cx="256" cy="256" r="192" fill="white" opacity="0.95"/>
  <!-- groove rings (dark) -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#0c100a" stroke-width="2"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#0c100a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="256" r="164" fill="none" stroke="#0c100a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#0c100a" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="136" fill="none" stroke="#0c100a" stroke-width="1.5" opacity="0.4"/>
  <!-- center label (dark circle) -->
  <circle cx="256" cy="256" r="80" fill="#0c100a"/>
  <!-- label grooves -->
  <circle cx="256" cy="256" r="68" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <!-- center hole -->
  <circle cx="256" cy="256" r="18" fill="white" opacity="0.9"/>
</svg>
