<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paul Silver</title>
  <meta name="description" content="Software engineering student at Curtin University. Building desktop apps, APIs, and tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      cursor: none !important;
    }

    :root {
      --bg:     #0d1117;
      --border: #21262d;
      --text:   #e6edf3;
      --muted:  #7d8590;
      --dim:    #4d5562;
      --accent: #388bfd;
      --green:  #3fb950;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* top accent line */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--green) 35%, transparent 65%);
      z-index: 100;
    }

    /* ── Custom cursor ── */
    #cd {
      position: fixed;
      top: 0; left: 0;
      z-index: 9999;
      width: 5px; height: 5px;
      background: var(--text);
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #cr {
      position: fixed;
      top: 0; left: 0;
      z-index: 9998;
      width: 30px; height: 30px;
      border: 1px solid rgba(56,139,253,0.5);
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
      opacity: 0;
      transition: width .2s, height .2s, border-color .2s, opacity .3s;
    }
    body.m #cd, body.m #cr { opacity: 1; }
    #cr.h { width: 48px; height: 48px; border-color: rgba(56,139,253,0.9); }

    /* ── Layout ── */
    .layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── Left ── */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(40px, 6vh, 72px) 48px clamp(36px, 5vh, 60px) clamp(40px, 5vw, 80px);
      border-right: 1px solid var(--border);
    }

    /* name */
    h1 {
      font-size: clamp(64px, 8vw, 112px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.92;
      background: linear-gradient(160deg, #e6edf3 25%, #6e7681 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── App grid ── */
    .projects { flex: 0 0 auto; }

    .app-grid {
      display: flex;
      gap: clamp(20px, 3.5vw, 48px);
      align-items: flex-start;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      flex: 0 0 auto;
    }

    .app-icon {
      width: clamp(64px, 7.5vw, 92px);
      height: clamp(64px, 7.5vw, 92px);
      border-radius: 22%;
      overflow: hidden;
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 13%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease;
      flex-shrink: 0;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .app-item:hover .app-icon {
      transform: scale(1.12) translateY(-6px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.55),
                  inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .app-label {
      position: relative;
      height: 14px;
      width: 90px;
      text-align: center;
    }

    .app-name, .app-desc {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 11px;
      transition: opacity 0.18s ease;
    }

    .app-name { color: var(--muted); font-weight: 500; opacity: 1; }
    .app-desc  { color: var(--dim);   font-weight: 400; opacity: 0; }

    .app-item:hover .app-name { opacity: 0; }
    .app-item:hover .app-desc  { opacity: 1; }

    /* ── Bottom bar ── */
    .links {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .link {
      font-size: 11px;
      font-weight: 500;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }
    .link:hover { color: var(--muted); }

    .link-info {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }

    .link-sep {
      width: 2px; height: 2px;
      background: var(--dim);
      border-radius: 50%;
      opacity: 0.35;
      flex-shrink: 0;
    }

    /* ── Right / canvas ── */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .canvas-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas-wrap::before {
      content: '';
      position: absolute;
      inset: -80px;
      background: radial-gradient(ellipse at center, rgba(102,80,196,0.09) 0%, transparent 68%);
      pointer-events: none;
    }

    #c {
      display: block;
      width: clamp(280px, 38vw, 460px);
      aspect-ratio: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Mobile fallback ── */
    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .layout { grid-template-columns: 1fr; height: auto; }
      .left { border-right: none; border-bottom: 1px solid var(--border); padding: 48px 28px 40px; }
      .right { padding: 48px 28px; order: -1; }
      #c { width: clamp(220px, 70vw, 320px); }
      .app-grid { gap: 16px; }
      .app-icon { width: 56px; height: 56px; }
      *, *::before, *::after { cursor: auto !important; }
      #cd, #cr { display: none; }
    }
  </style>
</head>
<body>

  <div id="cd"></div>
  <div id="cr"></div>

  <main class="layout">

    <!-- LEFT: identity + projects + links -->
    <div class="left">

      <div class="intro">
        <h1>Paul<br>Silver.</h1>
      </div>

      <div class="projects">
        <div class="app-grid">

          <a class="app-item" href="https://github.com/psilde/slackbuilder" target="_blank" rel="noopener">
            <div class="app-icon"><img src="icons/slackbuilder.png" alt="Slackbuilder"/></div>
            <div class="app-label">
              <span class="app-name">Slackbuilder</span>
              <span class="app-desc">AI desktop Slack composer</span>
            </div>
          </a>

          <a class="app-item" href="https://github.com/psilde/depth-public" target="_blank" rel="noopener">
            <div class="app-icon"><img src="icons/depth.svg" alt="Depth"/></div>
            <div class="app-label">
              <span class="app-name">Depth</span>
              <span class="app-desc">Valorant lobby tracker</span>
            </div>
          </a>

          <a class="app-item" href="https://github.com/psilde/deal-detector" target="_blank" rel="noopener">
            <div class="app-icon"><img src="icons/deal-detector.svg" alt="Deal Detector"/></div>
            <div class="app-label">
              <span class="app-name">Deal Detector</span>
              <span class="app-desc">Marketplace deal finder</span>
            </div>
          </a>

          <a class="app-item" href="https://github.com/psilde/cover-art" target="_blank" rel="noopener">
            <div class="app-icon"><img src="icons/cover-art.svg" alt="Cover Art"/></div>
            <div class="app-label">
              <span class="app-name">Cover Art</span>
              <span class="app-desc">Spotify cover extractor</span>
            </div>
          </a>

        </div>
      </div>

      <div class="links">
        <span class="link-info">Curtin University</span>
        <span class="link-sep"></span>
        <span class="link-info">Perth, WA &mdash; <span id="clock">00:00:00</span></span>
        <span class="link-sep"></span>
        <a class="link magnetic" href="https://github.com/psilde" target="_blank" rel="noopener">GitHub</a>
        <span class="link-sep"></span>
        <a class="link magnetic" href="https://www.linkedin.com/in/psilv/" target="_blank" rel="noopener">LinkedIn</a>
        <span class="link-sep"></span>
        <a class="link magnetic" href="mailto:psilver@outlook.com.au">Email</a>
      </div>

    </div>

    <!-- RIGHT: 3D shape -->
    <div class="right">
      <div class="canvas-wrap">
        <canvas id="c"></canvas>
      </div>
    </div>

  </main>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Three.js gem ──────────────────────────────────────────────────────

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.z = 4.8;

    // Dim ambient keeps unlit faces visible but dark
    const ambient = new THREE.AmbientLight(0x1a1248, 3.5);
    scene.add(ambient);

    // Static fill — edge definition from the left
    const fill = new THREE.DirectionalLight(0x6652c8, 0.6);
    fill.position.set(-3, 2, 2);
    scene.add(fill);

    // Mouse-driven shine — white point light that follows cursor
    const shine = new THREE.PointLight(0xffffff, 4.5, 20);
    shine.position.set(0, 2, 4.5);
    scene.add(shine);

    // Flat-shaded phong: crisp facets, strong specular response
    const mat = new THREE.MeshPhongMaterial({
      color: 0x5248a8,
      specular: 0xe8d8ff,
      shininess: 220,
      flatShading: true,
    });

    // Crown: 6-sided frustum — narrow table top, wide girdle
    const crownGeo = new THREE.CylinderGeometry(0.32, 1.0, 0.72, 6, 1, false);
    const crown = new THREE.Mesh(crownGeo, mat);
    crown.position.y = 0.36; // bottom of crown at y=0 (girdle)

    // Pavilion: 6-sided cone — base at girdle, tip down
    // ConeGeometry default: apex UP at +h/2, base DOWN at -h/2
    // After rotateX(π): apex DOWN at -h/2, base UP at +h/2
    const pavGeo = new THREE.ConeGeometry(1.0, 1.5, 6, 1, false);
    pavGeo.rotateX(Math.PI);
    const pav = new THREE.Mesh(pavGeo, mat);
    pav.position.y = -0.75; // base (now at +h/2=+0.75) aligns with y=0

    const gem = new THREE.Group();
    gem.add(crown);
    gem.add(pav);
    scene.add(gem);

    let autoRot = 0;
    let tMx = 0, tMy = 0, sMx = 0, sMy = 0;
    let tLx = 0, tLy = 2, sLx = 0, sLy = 2;

    window.addEventListener('mousemove', e => {
      const nx = (e.clientX / innerWidth)  * 2 - 1;
      const ny = -(e.clientY / innerHeight) * 2 + 1;
      tMx = nx * 0.35;
      tMy = ny * 0.25;
      tLx = nx * 5.5; // shine sweeps wide in X
      tLy = ny * 4.0; // and in Y
    });

    (function loop() {
      requestAnimationFrame(loop);
      autoRot += 0.004;
      gem.rotation.y = autoRot;
      sMx += (tMx - sMx) * 0.04;
      sMy += (tMy - sMy) * 0.04;
      gem.rotation.x = sMy;
      sLx += (tLx - sLx) * 0.06;
      sLy += (tLy - sLy) * 0.06;
      shine.position.set(sLx, sLy, 4.5);
      renderer.render(scene, camera);
    })();

    window.addEventListener('resize', () => {
      const s = canvas.clientWidth;
      renderer.setSize(s, s, false);
    });


    // ── Custom cursor ─────────────────────────────────────────────────────

    const cd = document.getElementById('cd');
    const cr = document.getElementById('cr');
    let cx = 0, cy = 0, px = 0, py = 0;

    document.addEventListener('mousemove', e => {
      cx = e.clientX; cy = e.clientY;
      cd.style.transform = `translate(calc(${cx}px - 50%), calc(${cy}px - 50%))`;
      document.body.classList.add('m');
    });

    (function lerpRing() {
      px += (cx - px) * 0.1;
      py += (cy - py) * 0.1;
      cr.style.transform = `translate(calc(${px}px - 50%), calc(${py}px - 50%))`;
      requestAnimationFrame(lerpRing);
    })();

    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => cr.classList.add('h'));
      el.addEventListener('mouseleave', () => cr.classList.remove('h'));
    });


    // ── Magnetic rows ─────────────────────────────────────────────────────

    document.querySelectorAll('.magnetic').forEach(el => {
      el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        const dx = (e.clientX - (r.left + r.width  / 2)) * 0.22;
        const dy = (e.clientY - (r.top  + r.height / 2)) * 0.22;
        el.style.transform  = `translate(${dx}px, ${dy}px)`;
        el.style.transition = 'transform 0.1s ease';
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform  = '';
        el.style.transition = 'transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)';
      });
    });


    // ── Live Perth clock ──────────────────────────────────────────────────

    const clk = document.getElementById('clock');
    const tick = () => clk.textContent = new Date().toLocaleTimeString('en-AU', {
      timeZone: 'Australia/Perth', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
    tick();
    setInterval(tick, 1000);

  </script>
</body>
</html>
